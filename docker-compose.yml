services:
  backend:
    build:
      context: ./backend
    container_name: feedback-board-backend
    environment:
      DATABASE_URL: sqlite:////data/feedback_board.db
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-change-this-local-admin-token}
    volumes:
      - feedback_data:/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: feedback-board-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  feedback_data: